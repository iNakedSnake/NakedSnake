<main>

<section>
	<h2 style = "color: darkred;">Contact Me</h2>

	<form action = "#" method = "post">
		<fieldset style = "border: 2px solid navy; padding: 15px; background-color: #f9f9f9;">
			<legend style = "color: darkgreen; font-weight: bold;">Personal Information</legend>

			<label for = "fullname">Full Name:</label><br>
			<input type = "text"
			       id = "fullname"
			       name = "fullname"
			       placeholder = "Enter your full name"
			       required
			       maxlength = "60"
			       style = "padding: 6px; border: 1px solid black; font-size: 14px;"><br><br>
			<label for = "email">Email</label><br>
			<input type = "email"
			       id = "email"
			       name = "email"
			       placeholder = "Enter your email"
			       required
			       style = "padding: 6px; border: 1px solid gray;"><br><br>

			<label for = "phone">Phone Number:</label><br>
			<input type = "tel"
			       id = "phone"
			       name = "phone"
			       placeholder = "Enter your phone number"
			       required
			       style = "padding: 6px; border: 1px solid gray;"><br><br>

			<label for = "age">Age:</label><br>
			<input type = "number"
			       id = "age"
			       name = "age"
			       min = "18"
			       max = "60"
			       required
			       placeholder = "Enter your age"
			       style = "padding: 6px; border: 1px solid gray;"><br><br>

			<label for = "date">Preferred Contact Date:</label><br>
			<input type = "date"
			       id = "date"
			       name = "date"
			       required
			       style = "padding: 6px; border: 1px solid gray;"><br><br>

			<label for="interest"> Interest Level:</label><br>
			<input type="range"
			       id = "interest"
			       name = "interest"
			       min = "1"
			       max = "10"
			       style = "background-color: lightblue;"><br><br>

			<label for = "subject">Subject: </label>
			<select id = "subject"
			        name = "subject"
			        required
			        style = "padding: 6px; background-color: #eeeeee;">

		    <optgroup label="Academic">
                    <option value="assignment">Assignment</option>
                    <option value="project">Project</option>
                </optgroup>
                <optgroup label="General">
                    <option value="question">Question</option>
                    <option value="feedback">Feedback</option>
                </optgroup>
            </select><br><br>

            <p>Services Needed:</p>
            <input type="checkbox" id="webhelp" name="services" value="webhelp">
            <label for="webhelp">Web Help</label><br>

            <input type="checkbox" id="codinghelp" name="services" value="codinghelp">
            <label for="codinghelp">Coding Help</label><br>

            <input type="checkbox" id="advice" name="services" value="advice">
            <label for="advice">Study Advice</label><br><br>

            <p>Preferred Contact Method:</p>
            <input type="radio" id="contact-email" name="contactmethod" value="email" required>
            <label for="contact-email">Email</label><br>

            <input type="radio" id="contact-phone" name="contactmethod" value="phone">
            <label for="contact-phone">Phone</label><br>

            <input type="radio" id="contact-whatsapp" name="contactmethod" value="whatsapp">
            <label for="contact-whatsapp">WhatsApp</label><br><br>

            <label for="message">Message:</label><br>
            <textarea id="message"
                      name="message"
                      rows="5"
                      cols="40"
                      placeholder="Write your message here"
                      maxlength="300"
                      required
                      style="padding: 8px; border: 1px solid gray;"></textarea><br><br>

            <button type="submit"
                    style="background-color: navy; color: white; padding: 8px; border: 1px solid black;">
                Send
            </button>
        </fieldset>
    </form>
</section>
